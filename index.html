<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Ottimo — Generatore PSCL</title>
<style>
:root{--blue:#2563eb;--dark:#0f172a;--orange:#f07010;--green:#16a34a;--teal:#00b4a0;--gray:#f8fafc;--border:#e5e7eb;--muted:#6b7280;--font:'Segoe UI',Arial,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:#eef2f9;color:#111;display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--dark);color:#fff;position:fixed;top:0;left:0;height:100vh;overflow-y:auto;z-index:100}
.slogo{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px}
.slogo svg{flex-shrink:0}
.slogo-txt{color:#fff;font-weight:800;font-size:16px}
.ssec{padding:14px 12px 4px;font-size:10px;font-weight:700;color:rgba(255,255,255,.35);letter-spacing:1px;text-transform:uppercase}
.sitem{display:flex;align-items:center;gap:8px;padding:9px 16px;font-size:13px;color:rgba(255,255,255,.65);cursor:pointer;border-radius:6px;margin:1px 8px;transition:.15s}
.sitem:hover{background:rgba(255,255,255,.08);color:#fff}
.sitem.active{background:var(--blue);color:#fff;font-weight:600}
.sitem.done{color:rgba(255,255,255,.85)}
.main{margin-left:220px;flex:1}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:0 28px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-t{font-size:15px;font-weight:700}
.topbar-s{font-size:13px;color:var(--muted)}
.content{padding:22px 28px 60px;max-width:900px}
.card{background:#fff;border-radius:12px;border:1px solid var(--border);padding:24px 28px;margin-bottom:18px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.ctit{font-size:18px;font-weight:700;color:var(--blue);margin-bottom:4px}
.csub{font-size:13px;color:var(--muted);margin-bottom:20px}
.sbadge{display:inline-flex;align-items:center;background:#eff6ff;color:var(--blue);font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.cf{grid-column:1/-1}
.fg label,.fg3 label,.cf label{display:block;font-weight:600;font-size:13px;margin-bottom:3px}
.fh{font-size:11px;color:var(--muted);margin-bottom:5px}
input[type=text],input[type=number],textarea{width:100%;padding:10px 13px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-family:var(--font);outline:none;background:#fff;transition:.15s}
input:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
textarea{resize:vertical;min-height:90px}
.yn{display:flex;gap:8px;margin-top:3px}
.ynb{padding:7px 22px;border-radius:10px;border:1.5px solid var(--border);background:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:.15s;color:var(--muted)}
.ynb.ay{background:var(--blue);color:#fff;border-color:var(--blue)}
.ynb.an{background:#f9fafb;color:#333;border-color:var(--border)}
.isl{border:2px dashed #c7d2fe;border-radius:10px;background:#f8faff;margin-bottom:12px;overflow:hidden}
.ish{background:#e0e7ff;padding:9px 14px;display:flex;align-items:center;justify-content:space-between}
.isl-l{font-size:11.5px;font-weight:700;color:#3730a3}
.isl-h{font-size:10.5px;color:#6366f1}
.isb{padding:14px;display:flex;flex-direction:column;align-items:center;gap:9px}
.isb.hi{padding:0}
.isb img{width:100%;display:block;max-height:280px;object-fit:contain}
.ibtns{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.ibtn{padding:7px 16px;border-radius:8px;border:none;font-size:12.5px;font-weight:600;cursor:pointer}
.ibtn.up{background:var(--blue);color:#fff}
.ibtn.pa{background:#fff;color:var(--blue);border:1.5px solid var(--blue)}
.ibtn.rm{background:#fff;color:#dc2626;border:1.5px solid #fca5a5;font-size:11px;padding:4px 12px;margin:8px}
.inote{font-size:11px;color:#818cf8;text-align:center}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.nbtns{display:flex;justify-content:space-between;align-items:center;margin-top:6px;padding-bottom:20px}
.nb{padding:10px 26px;border-radius:9px;border:none;font-size:14px;font-weight:700;cursor:pointer;transition:.15s}
.nb.prev{background:#eff6ff;color:var(--blue)}
.nb.prev:disabled{background:#f3f4f6;color:#d1d5db;cursor:default}
.nb.next{background:var(--blue);color:#fff}
.nb.gen{background:var(--green);color:#fff}
.cbox{background:#fffae8;border:1.5px solid #fde047;border-radius:10px;padding:14px 16px;margin-top:6px}
.ctit2{font-weight:700;color:#854d0e;margin-bottom:6px;font-size:13px}
.cpar{font-size:11.5px;color:#92400e;margin-bottom:12px;line-height:1.6}
.rbox{background:#f0fdf4;border:1.5px solid #86efac;border-radius:10px;padding:12px 14px;margin-top:12px}
.rtit{font-weight:700;color:#15803d;margin-bottom:7px;font-size:13px}
table.ct{width:100%;border-collapse:collapse;font-size:12.5px}
table.ct th{text-align:left;padding:4px 8px;color:#15803d;font-size:12px;border-bottom:1.5px solid #86efac;font-weight:700}
table.ct th.r,table.ct td.r{text-align:right}
table.ct td{padding:4px 8px;border-bottom:1px solid #dcfce7}
table.ct tr.tot td{font-weight:700;color:#15803d;border-top:2px solid #86efac;border-bottom:none}
#rv{display:none}
.rw{background:#fff;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,.1);overflow:hidden;max-width:1050px;margin:0 auto}
.rcov{background:linear-gradient(135deg,#0f172a,#1d4ed8 55%,#00b4a0);color:#fff;padding:46px 52px 38px;display:grid;grid-template-columns:1fr 190px;gap:28px;align-items:center}
.rbadge{background:rgba(255,255,255,.15);border-radius:5px;padding:3px 12px;font-size:10px;letter-spacing:2px;text-transform:uppercase;display:inline-block;margin-bottom:12px}
.rcomp{font-size:30px;font-weight:800;margin-bottom:6px;line-height:1.2}
.rtit2{font-size:17px;opacity:.85;margin-bottom:10px}
.rmeta{font-size:12.5px;opacity:.7;line-height:1.9}
.rlogo{background:rgba(255,255,255,.15);border-radius:10px;padding:10px;display:flex;flex-direction:column;align-items:center;gap:8px}
.rlogo-b{width:160px;height:80px;display:flex;align-items:center;justify-content:center;overflow:hidden;border-radius:6px;background:rgba(255,255,255,.1)}
.rlogo-b img{max-width:150px;max-height:76px;object-fit:contain}
.rconf{background:rgba(255,255,255,.15);border-radius:6px;padding:5px 12px;font-size:11px;font-weight:700;text-align:center;color:#fff;width:100%}
.rsh{min-height:64px;display:flex;align-items:center;padding:0 52px;background:linear-gradient(90deg,#0f172a,#1d4ed8 60%,#00b4a0);gap:14px}
.rsh-n{font-size:32px;font-weight:800;color:rgba(255,255,255,.25)}
.rsh-t{font-size:16px;font-weight:700;color:#fff}
.rc{padding:28px 52px}
.rh4{font-size:13.5px;font-weight:700;color:var(--orange);margin:20px 0 7px;border-left:4px solid var(--orange);padding-left:9px}
.rp{font-size:13px;line-height:1.85;margin-bottom:10px}
.rp strong{color:#1e3a8a}
.krow{display:flex;gap:12px;margin:14px 0;flex-wrap:wrap}
.kpi{flex:1;min-width:110px;background:#f8fafc;border-radius:9px;padding:12px 14px;border-left:4px solid var(--blue)}
.kv{font-size:24px;font-weight:800;color:var(--blue);line-height:1}
.kl{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.4}
.kpi.g{border-color:var(--green)}.kpi.g .kv{color:var(--green)}
.kpi.o{border-color:var(--orange)}.kpi.o .kv{color:var(--orange)}
.kpi.r{border-color:#dc2626}.kpi.r .kv{color:#dc2626}
.etw{background:#f0fdf4;border:1.5px solid #86efac;border-radius:10px;padding:14px;margin:12px 0}
.ett{font-weight:700;color:#15803d;margin-bottom:8px;font-size:13px}
table.et{width:100%;border-collapse:collapse;font-size:12.5px}
table.et th{color:#15803d;padding:5px 10px;border-bottom:1.5px solid #86efac;font-size:12px;text-align:left}
table.et th.r,table.et td.r{text-align:right}
table.et td{padding:5px 10px;border-bottom:1px solid #dcfce7}
table.et tr.tot td{font-weight:700;color:#15803d;border-top:2px solid #86efac;border-bottom:none}
.en{font-size:11px;color:#4ade80;margin-top:7px}
table.mt{width:100%;border-collapse:collapse;font-size:13px;margin:10px 0}
table.mt th{background:var(--blue);color:#fff;padding:7px 12px;text-align:left;font-size:12px}
table.mt th.r,table.mt td.r{text-align:right}
table.mt td{padding:7px 12px;border-bottom:1px solid var(--border)}
.dn{color:#dc2626;font-weight:700}.up{color:var(--green);font-weight:700}
.ml{background:#f8fafc;border-radius:9px;padding:14px 18px;font-size:13px;line-height:1.9;white-space:pre-wrap;border-left:4px solid var(--blue);margin:10px 0}
.nli{font-size:13px;line-height:1.9;padding-left:18px}
.nli li{margin-bottom:2px}
.rfoot{background:#0f172a;color:rgba(255,255,255,.4);padding:14px 52px;font-size:11px;display:flex;justify-content:space-between}
.icap{font-size:12.5px;font-weight:700;color:#1e3a8a;border-left:3px solid var(--blue);padding-left:8px;margin:16px 0 5px}
.ebar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px;background:#fff;border-radius:11px;padding:12px 18px;border:1px solid var(--border)}
.ebar-t{font-size:16px;font-weight:700;color:var(--blue)}
.ebtns{display:flex;gap:8px;flex-wrap:wrap}
.ebtn{padding:9px 20px;border-radius:8px;border:none;font-size:13px;font-weight:700;cursor:pointer}
.ebtn.back{background:#eff6ff;color:var(--blue)}
.ebtn.pdf{background:var(--orange);color:#fff}
.ebtn.word{background:#2b579a;color:#fff}
@media print{
  .sidebar,.topbar,.nbtns,#fv,.ebar{display:none!important}
  #rv{display:block!important}
  .rw{box-shadow:none;border-radius:0}
  .rcov,.rsh{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  body{background:#fff}.main{margin-left:0}
}
</style>
</head>

<div class="sidebar">
  <div class="slogo">

  </div>
  <div class="content" id="rv" style="max-width:1100px">

      </div>
    </div>
    <div class="rw" id="rc"></div>
  </div>
</div>

  const b1 = Math.max(0.1, num('p1_tasso_occ')), b2 = Math.max(0.1, num('p2_tasso_occ'));
  const eC = 161.71922/1000, eN = 0.304687/1000, eP = 0.030991/1000;
  const p1a = num('p1_persone'), p1c = num('p1_distanza')*2, p1d = num('p1_giorni');
  const p1 = { n:p1a, CO2:(((p1a/b1)*p1c)*p1d*eC).toFixed(2), NOx:(((p1a/b1)*p1c)*p1d*eN).toFixed(2), PM10:(((p1a/b1)*p1c)*p1d*eP).toFixed(2) };
  const p2a = num('p2_corse'), p2c = num('p2_distanza')*2, p2d = num('p2_giorni');
  const p2 = { n:p2a, CO2:(((p2a/b2)*p2c)*p2d*eC).toFixed(2), NOx:(((p2a/b2)*p2c)*p2d*eN).toFixed(2), PM10:(((p2a/b2)*p2c)*p2d*eP).toFixed(2) };
  const p3a = num('p3_persone'), p3c = num('p3_dist_auto')*2, p3f = num('p3_giorni');
  const p3d = num('p3_viaggi_giorno'), p3e = num('p3_dist_navetta');
  const p3CO2 = Math.max(0, (((p3a/1.2)*p3c)*p3f*eC) - (p3d*p3e*p3f*717.99813/1000));
  const p3NOx  = Math.max(0, (((p3a/1.2)*p3c)*p3f*eN) - (p3d*p3e*p3f*3.269033/1000));
  const p3PM10 = Math.max(0, (((p3a/1.2)*p3c)*p3f*eP) - (p3d*p3e*p3f*0.126615/1000));
  const p3 = { n:p3a, CO2:p3CO2.toFixed(2), NOx:p3NOx.toFixed(2), PM10:p3PM10.toFixed(2) };
  const tot = { n:p1.n+p2.n+p3.n, CO2:(+p1.CO2+ +p2.CO2+ +p3.CO2).toFixed(2), NOx:(+p1.NOx+ +p2.NOx+ +p3.NOx).toFixed(2), PM10:(+p1.PM10+ +p2.PM10+ +p3.PM10).toFixed(2) };
  return { p1, p2, p3, tot };
}

function bindInput(id, key) {
  const el = $(id); if (!el) return;
  el.value = D[key] ?? '';
  el.addEventListener('input', () => { D[key] = el.value; updateCalc(); updateModal(); });
}

function bindYN(key) {
  document.querySelectorAll('[data-yn="' + key + '"]').forEach(btn => {
    const v = btn.dataset.val === 'true';
    btn.className = 'ynb' + (D[key] === v ? (v ? ' ay' : ' an') : '');
    btn.onclick = () => {
      D[key] = v;
      document.querySelectorAll('[data-yn="' + key + '"]').forEach(b => {
        const bv = b.dataset.val === 'true';
        b.className = 'ynb' + (D[key] === bv ? (bv ? ' ay' : ' an') : '');
      });
    };
  });
}

function updateCalc() {
  if (cur !== 7) return;
  const c = calcAll();
  ['p1','p2','p3','tot'].forEach(p => {
    ['n','CO2','NOx','PM10'].forEach(k => { const e = $('pc-'+p+'-'+k); if(e) e.textContent = c[p][k]; });
  });
}

function updateModal() {
  if (cur !== 4) return;
  const t = (num('n_auto')+num('n_tpl')+num('n_attiva')) || 1;
  const e1=$('ms-tot'),e2=$('ms-a'),e3=$('ms-t'),e4=$('ms-m');
  if(e1) e1.textContent=t;
  if(e2) e2.textContent=D.n_auto+' ('+(num('n_auto')/t*100).toFixed(1)+'%)';
  if(e3) e3.textContent=D.n_tpl+' ('+(num('n_tpl')/t*100).toFixed(1)+'%)';
  if(e4) e4.textContent=D.n_attiva+' ('+(num('n_attiva')/t*100).toFixed(1)+'%)';
}

function setupSlot(sid, dk) {
  const slot = $(sid); if (!slot) return;
  const body = slot.querySelector('.isb');
  if (D[dk]) {
    body.className = 'isb hi';
    body.innerHTML = '<img src="'+D[dk]+'" alt=""/><button class="ibtn rm" onclick="clearImg(\''+dk+'\',\''+sid+'\')">✕ Rimuovi</button>';
  } else {
    body.className = 'isb';
    body.innerHTML = '<div class="ibtns"><button class="ibtn up" onclick="trigUp(\''+dk+'\',\''+sid+'\')">⬆ Carica</button><button class="ibtn pa" onclick="trigPaste(\''+dk+'\',\''+sid+'\')">📋 Incolla</button></div><p class="inote">Screenshot da Ottimo Survey</p>';
  }
}

function trigUp(dk, sid) { pendImg = {dk, sid}; $('fi').click(); }
function clearImg(dk, sid) { D[dk] = null; setupSlot(sid, dk); }
function trigPaste(dk, sid) {
  pendImg = {dk, sid};
  navigator.clipboard.read().then(items => {
    for (const it of items) {
      const t = it.types.find(x => x.startsWith('image/'));
      if (t) { it.getType(t).then(b => { const r=new FileReader(); r.onload=e=>{D[dk]=e.target.result;setupSlot(sid,dk);}; r.readAsDataURL(b); }); return; }
    }
    alert('Nessuna immagine negli appunti.');
  }).catch(() => alert('Permesso appunti negato. Usa Carica.'));
}

$('fi').addEventListener('change', function() {
  if (!this.files[0] || !pendImg) return;
  const r = new FileReader();
  r.onload = e => {
    D[pendImg.dk] = e.target.result;
    if (pendImg.isLogo) { const la=$('logo-area'); if(la) la.innerHTML='<img src="'+D.logo_data+'" style="max-width:160px;max-height:80px;object-fit:contain"/>'; }
    else setupSlot(pendImg.sid, pendImg.dk);
    pendImg = null;
  };
  r.readAsDataURL(this.files[0]); this.value = '';
});

  return '<div class="isl" id="'+sid+'"><div class="ish"><span class="isl-l">📷 '+lbl+'</span><span class="isl-h">'+hint+'</span></div><div class="isb"></div></div>';

function startWord() {
  const btn = $('wbtn');
  btn.textContent = '⏳ Generazione...';

    try { doWordExport(); } catch(e) { alert('Errore: ' + e.message); }

// ═══════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════
function goTo(n) {
  cur = n;
  const isReport = n === STEPS.length - 1;
  $('fv-wrap').style.display = isReport ? 'none' : 'block';
  $('rv').style.display = isReport ? 'block' : 'none';
  if (isReport) { renderReport(); }
  else { render(n); }

  $('sidebar').innerHTML = STEPS.map((l,i) =>
    '<div class="sitem'+(i===cur?' active':i<cur?' done':'')+'" onclick="goTo('+i+')">'+
    '<span style="width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.5;flex-shrink:0;display:inline-block"></span> '+l+'</div>'
  ).join('');

  $('tbar-t').textContent = STEPS[cur];
  $('tbar-s').textContent = 'Passaggio '+(cur+1)+' di '+STEPS.length;

  const bp=$('bp'), bn=$('bn'), nb=$('nbtns');
  if (!isReport && bp && bn && nb) {
    nb.style.display = 'flex';
    bp.disabled = cur === 0;
    const last = cur === STEPS.length - 2;
    bn.textContent = last ? '🚀 Genera PSCL →' : 'Avanti →';
    bn.className = 'nb ' + (last ? 'gen' : 'next');
  }
  window.scrollTo({top:0, behavior:'smooth'});
}

function next() { if (cur < STEPS.length-1) goTo(cur+1); }
function prev() { if (cur > 0) goTo(cur-1); }

goTo(0);
</script>
